apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: guestbook
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/YOUR_ORG/guestbook  # replace with your repo URL
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guestbook
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: guestbook
  path: ./apps/guestbook
  prune: true
  wait: true
  timeout: 2m
